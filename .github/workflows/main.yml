name: Universal APK Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '应用名称'
        required: true
        default: 'test-app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease > build-${{ inputs.app_name }}.log

      # 上传日志到 GitHub Actions Artifact（Agent 可直接读取）
      - name: Upload build log to GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.app_name }}
          path: ./build-${{ inputs.app_name }}.log
          if-no-files-found: warn

      # 安装并配置 OSSUtil
      - name: Install OSSUtil
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.14/ossutil64
          chmod +x ossutil64

      - name: Configure OSSUtil
        run: |
          ./ossutil64 config -e oss-cn-beijing.aliyuncs.com -i ${{ secrets.ALIYUN_AK }} -k ${{ secrets.ALIYUN_SK }}

      # 上传日志到 OSS（可生成公开链接）
      - name: Upload log to Aliyun OSS
        run: |
          ./ossutil64 cp ./build-${{ inputs.app_name }}.log oss://${{ secrets.ALIYUN_BUCKET }}/logs/

      # 上传 APK 到 OSS
      - name: Upload APK to Aliyun OSS
        run: |
          ./ossutil64 cp ./app/build/outputs/apk/release/*.apk oss://${{ secrets.ALIYUN_BUCKET }}/apks/${{ inputs.app_name }}/
